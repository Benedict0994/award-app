<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { background: #0f3460; color: #fff; padding: 32px; text-align: center; }
    .header h1 { margin: 0; font-size: 24px; }
    .body { padding: 32px; color: #333; line-height: 1.6; }
    .message-box { background: #f9f9f9; border-left: 4px solid #0f3460; padding: 16px; border-radius: 4px; margin-top: 16px; }
    .footer { background: #f4f4f4; text-align: center; padding: 16px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>New Contact Message</h1>
    </div>
    <div class="body">
      <p>You received a new message from <strong>{{name}}</strong> (<a href="mailto:{{email}}">{{email}}</a>).</p>
      <div class="message-box">{{message}}</div>
    </div>
    <div class="footer">This email was sent automatically. Please do not reply.</div>
  </div>
</body>
</html>
